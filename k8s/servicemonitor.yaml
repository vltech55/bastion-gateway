# Requires kube-prometheus-stack (prometheus-operator). With the standard install,
# applying this object makes Prometheus auto-scrape the gateway pods.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gateway
  namespace: llm-gateway
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
